name: Publish to GitHub Packages

on:
  release:
    types: [created, published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build all JARs
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Package release zip & tar.gz
        run: |
          VER=${{ github.ref_name }}
          PKDIR="packaging/zeta-worker-${VER}"
          mkdir -p "${PKDIR}/lib"
          mkdir -p "${PKDIR}/docker"
          cp worker/target/zeta-worker-*.jar "${PKDIR}/lib/"
          cp worker/Dockerfile worker/docker-compose.yml "${PKDIR}/docker/"
          cp -r docs "${PKDIR}/"
          cp README.md README.zh.md LICENSE "${PKDIR}/"
          (cd packaging && zip -r "../zeta-worker-${VER}.zip" "zeta-worker-${VER}")
          (cd packaging && tar czf "../zeta-worker-${VER}.tar.gz" "zeta-worker-${VER}")

      - name: Publish common to GitHub Packages
        run: mvn deploy -pl common -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JARs and packages to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            common/target/zeta-*.jar
            common/target/zeta-*-sources.jar
            common/target/zeta-*-javadoc.jar
            worker/target/zeta-worker-*.jar
            zeta-worker-*.zip
            zeta-worker-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
