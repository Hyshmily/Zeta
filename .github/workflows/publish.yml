name: Publish to GitHub Packages

on:
  release:
    types: [created, published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Publish to GitHub Packages
        run: mvn clean deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build worker JAR
        run: mvn clean package -pl worker -am -DskipTests --no-transfer-progress

      - name: Upload worker jar to Release
        uses: softprops/action-gh-release@v2
        with:
          files: worker/target/hotkey-worker-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
