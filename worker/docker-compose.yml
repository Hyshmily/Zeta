version: "3.9"

name: hotkey-worker

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:4.0-alpine}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  worker:
    image: ghcr.io/hyshmily/hotkey-worker:1.1.53
    pull_policy: always
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      HOTKEY_WORKER_ENABLED: "true"
      # HOTKEY_WORKER_ROUTING_APP_NAME: "myapp"  # 必须与 App 侧 hotkey.local.app-name 一致
    depends_on:
      redis:      { condition: service_healthy }
      rabbitmq:   { condition: service_healthy }
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
