name: zeta-cluster

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [zeta-net]

  rabbitmq:
    image: rabbitmq:4.0-alpine
    ports:
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [zeta-net]


  worker-1: &worker-base
    build: ./worker
    environment:
      INSTANCE_ID: worker-1
      APP_NAME: zeta-demo
      ZETA_WORKER_ENABLED: "true"
      ZETA_WORKER_ROUTING_APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      app-1: { condition: service_started }
    restart: unless-stopped
    networks: [zeta-net]

  worker-2:
    <<: *worker-base
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      app-1: { condition: service_started }
    environment:
      INSTANCE_ID: worker-2
      APP_NAME: zeta-demo
      ZETA_WORKER_ENABLED: "true"
      ZETA_WORKER_ROUTING_APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq

  app-1: &app-base
    build: ./demo-app
    ports:
      - "9090:8080"
    environment:
      INSTANCE_ID: app-1
      APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      ZETA_LOCAL_EXECUTOR_QUEUE_CAPACITY: "50000"
      ZETA_WORKER_LISTENER_ENABLED: "true"
      ZETA_LOCAL_REPORTER_LIMITER_ENABLED: "false"
      ZETA_HEARTBEAT_TIMEOUT_MS: "30000"
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
    networks: [zeta-net]

  app-2:
    <<: *app-base
    ports: []
    environment:
      INSTANCE_ID: app-2
      APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      ZETA_WORKER_LISTENER_ENABLED: "true"

  app-3:
    <<: *app-base
    ports: []
    environment:
      INSTANCE_ID: app-3
      APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      ZETA_WORKER_LISTENER_ENABLED: "true"

  app-4:
    <<: *app-base
    ports: []
    environment:
      INSTANCE_ID: app-4
      APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      ZETA_WORKER_LISTENER_ENABLED: "true"

  app-5:
    <<: *app-base
    ports: []
    environment:
      INSTANCE_ID: app-5
      APP_NAME: zeta-demo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      ZETA_WORKER_LISTENER_ENABLED: "true"


  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6/scripts:/scripts
      - ./k6/result:/result
    command: run /scripts/e2e-chain.js --summary-export=/result/e2e-summary.json --summary-trend-stats="avg,min,med,max,p(50),p(75),p(90),p(95),p(99)"
    environment:
      TARGET_URL: http://app-1:8080
    depends_on:
      - app-1
    networks: [zeta-net]

networks:
  zeta-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
